name: klinik
description: 'Aplikasi Klinik Merah Putih - Sistem Manajemen Klinik'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # State Management
  flutter_bloc: ^9.1.1
  provider: ^6.1.2

  # Networking
  http: ^1.6.0
  dio: ^5.4.0
  flutter_secure_storage: ^8.1.0
  flutter_riverpod: ^2.5.0

  # Storage & Config
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.0

  # Content & Display
  flutter_markdown: ^0.7.5
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.12.0

  # Barcode & QR
  barcode_widget: ^2.0.3
  qr_flutter: ^4.1.0

  # File Management
  path_provider: ^2.1.3
  share_plus: ^13.1.0
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/regulations/
